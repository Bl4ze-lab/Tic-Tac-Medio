<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tic Tac do Bl4ze</title>

<style>
body{
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

/* 🔥 PAINEL */
.panel{
  background:#1e293b;
  padding:12px 20px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:330px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  animation:fadeIn 0.6s ease;
}

.player{
  display:flex;
  gap:10px;
  align-items:center;
}

.player input{
  width:100px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:6px;
  padding:5px;
}

#coins{
  background:#f59e0b;
  color:black;
  padding:5px 10px;
  border-radius:10px;
  font-weight:bold;
}

.options{
  display:flex;
  gap:5px;
}

select{
  background:#0f172a;
  color:white;
  border:none;
  border-radius:6px;
  padding:5px;
}

/* 🎮 TABULEIRO */
#board{
  display:grid;
  grid-template-columns:repeat(3, 100px);
  gap:12px;
  margin-top:20px;
}

.cell{
  width:100px;
  height:100px;
  border-radius:14px;
  background:#1e293b;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.cell:hover{transform:scale(1.08);}
.cell:active{transform:scale(0.95);}

.cell img{
  width:60px;
  animation:pop 0.25s ease;
}

/* ✨ ANIMAÇÕES */
@keyframes pop{
  from{transform:scale(0); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

.win{
  animation:winPulse 0.5s infinite alternate;
}

@keyframes winPulse{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* STATUS */
#status{
  margin-top:10px;
  height:20px;
}

/* BOTÃO */
button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

/* 🛒 LOJA */
.shop{
  margin-top:15px;
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
  animation:fadeIn 0.8s ease;
}

.shop button{
  margin:5px;
}
</style>
</head>

<body>

<h1>Tic Tac do Bl4ze</h1>

<div class="panel">
  <div class="player">
    <input id="name" placeholder="Seu nome">
    <span id="coins">💰 0</span>
  </div>

  <div class="options">
    <select id="mode">
      <option value="ai">Vs IA</option>
      <option value="pvp">2 Jogadores</option>
    </select>

    <select id="difficulty">
      <option value="easy">Fácil</option>
      <option value="medium">Médio</option>
      <option value="hard">Impossível</option>
    </select>
  </div>
</div>

<div id="board"></div>
<div id="status"></div>
<button onclick="resetGame()">Reiniciar</button>

<div class="shop">
  <h3>🛒 Loja</h3>
  <button onclick="buySkin('blue')"> Azul (10)</button>
  <button onclick="buySkin('green')"> Verde (10)</button>
  <button onclick="buySkin('red')"> Vermelho (10)</button>
  <button onclick="buySkin('purple')"> Roxo (10)</button>
  <button onclick="buySkin('white')">Branco (10)</button>       
</div>

<script>

// 🔥 PNG AQUI
const icons = {
  X: "x.png",
  O: "o.png"
};

let board=["","","","","","","","",""];
let currentPlayer="X";
let gameOver=false;

let coins=parseInt(localStorage.getItem("coins")||0);
let skin=localStorage.getItem("skin")||"default";
let nameInput=document.getElementById("name");

function create(){
 const boardEl=document.getElementById("board");
 boardEl.innerHTML="";
 board.forEach((c,i)=>{
  const cell=document.createElement("div");
  cell.className="cell";

  if(c){
   let img=document.createElement("img");
   img.src=icons[c];
   cell.appendChild(img);
  }

  cell.onclick=()=>move(i);
  boardEl.appendChild(cell);
 });
}

function move(i){
 if(board[i]||gameOver)return;

 board[i]=currentPlayer;
 update();

 if(check(currentPlayer)) return end(currentPlayer);

 if(board.every(c=>c)) return end("draw");

 if(document.getElementById("mode").value==="pvp"){
  currentPlayer=currentPlayer==="X"?"O":"X";
 }else{
  setTimeout(ai,300);
 }
}

function ai(){
 let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
 let move=empty[Math.floor(Math.random()*empty.length)];
 board[move]="O";
 update();

 if(check("O")) return end("O");
 if(board.every(c=>c)) return end("draw");

 currentPlayer="X";
}

function check(p){
 const wins=[
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
 ];

 return wins.some(combo=>{
  if(combo.every(i=>board[i]===p)){
    highlight(combo);
    return true;
  }
 });
}

function highlight(combo){
 const cells=document.querySelectorAll(".cell");
 combo.forEach(i=>cells[i].classList.add("win"));
}

function end(winner){
 gameOver=true;

 if(winner==="X") coins+=5;

 document.getElementById("status").textContent=
  winner==="draw"?"Empate":winner+" venceu";

 updateCoins();
 save();
}

function resetGame(){
 board=["","","","","","","","",""];
 gameOver=false;
 currentPlayer="X";
 document.getElementById("status").textContent="";
 create();
}

function updateCoins(){
 document.getElementById("coins").textContent="💰 "+coins;
}

function buySkin(type){
 if(coins<10)return alert("Sem moedas!");
 coins-=10;

 if(type==="blue") document.body.style.background="#1e3a8a";
 if(type==="green") document.body.style.background="#064e3b";
 if(type==="red") document.body.style.background="#7f1d1d";
 if(type==="purple") document.body.style.background="#5b21b6";
 if(type==="white") document.body.style.background="#f3f4f6";

 updateCoins();
 save();
}

function save(){
 localStorage.setItem("coins",coins);
 localStorage.setItem("name",nameInput.value);
}

function load(){
 nameInput.value=localStorage.getItem("name")||"";
 updateCoins();
}

function update(){
 create();
}

load();
create();

</script>

</body>
</html>
