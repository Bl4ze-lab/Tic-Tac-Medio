<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Tic Tac Toe</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: radial-gradient(circle at top, #1f1c2c, #090913);
    color: white;
    margin: 0; padding: 0;
  }

  h1 {
    margin-top: 30px;
    font-size: 34px;
    letter-spacing: 1px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 12px;
    justify-content: center;
    margin-top: 40px;
    position: relative;
  }

  .cell {
    width: 110px;
    height: 110px;
    font-size: 42px;
    font-weight: bold;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(6px);
    color: white;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  }

  .cell:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.12);
  }

  .cell.X { color: #ff6b6b; }
  .cell.O { color: #6bc2ff; }

  #status {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    min-height: 30px;
  }

  button {
    margin-top: 20px;
    padding: 12px 22px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #4ca6ff, #6bc2ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  }

  button:hover {
    transform: scale(1.08);
  }

  #line {
    position: absolute;
    background-color: #ffd93d;
    border-radius: 5px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
</style>
</head>
<body>

<h1>Tic Tac vs IA</h1>

<div id="board"></div>
<div id="status">Sua vez</div>
<button onclick="resetGame()">Reiniciar</button>

<div id="line"></div>

<script>
  const boardElement = document.getElementById("board");
  const statusText = document.getElementById("status");

  let board = ["", "", "", "", "", "", "", "", ""];
  let gameOver = false;

  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function createBoard() {
    boardElement.innerHTML = "";
    board.forEach((cell, index) => {
      const btn = document.createElement("button");
      btn.classList.add("cell");
      btn.textContent = cell;
      if(cell) btn.classList.add(cell);
      btn.onclick = () => playerMove(index);
      boardElement.appendChild(btn);
    });
  }

  function playerMove(i) {
    if (board[i] || gameOver) return;

    board[i] = "X";
    update();

    if (check("X")) return end("Você venceu 😎");
    if (full()) return end("Empate!");

    statusText.textContent = "IA pensando...";
    setTimeout(aiMove, 400);
  }

  function aiMove() {
    let move;

    // 🔥 DIFICULDADE REDUZIDA
    if (Math.random() < 0.4) {
      // 40% joga aleatório
      const empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
      move = empty[Math.floor(Math.random()*empty.length)];
    } else {
      move = bestMove();
    }

    board[move] = "O";
    update();

    if (check("O")) return end("IA venceu 🤖");
    if (full()) return end("Empate!");

    statusText.textContent = "Sua vez";
  }

  function bestMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = "O";
        let score = minimax(false);
        board[i] = "";
        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }
    return move;
  }

  function minimax(isMax) {
    if (check("O")) return 1;
    if (check("X")) return -1;
    if (full()) return 0;

    let best = isMax ? -Infinity : Infinity;

    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = isMax ? "O" : "X";
        let score = minimax(!isMax);
        board[i] = "";
        best = isMax ? Math.max(score, best) : Math.min(score, best);
      }
    }
    return best;
  }

  function check(p) {
    return wins.some(c => c.every(i => board[i] === p));
  }

  function full() {
    return board.every(c => c);
  }

  function update() {
    createBoard();
  }

  function end(msg) {
    statusText.textContent = msg;
    gameOver = true;
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameOver = false;
    statusText.textContent = "Sua vez";
    update();
  }

  createBoard();
</script>

</body>
</html>
