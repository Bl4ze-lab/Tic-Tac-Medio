<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tic Tac Pro</title>

<style>
body{
  font-family:Segoe UI;
  background: radial-gradient(circle at top,#0f0c29,#302b63,#24243e);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

h1{font-size:32px;}

#score{margin:10px;font-size:18px;}

select{margin:5px;padding:5px;border-radius:5px;}

#board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
  margin-top:20px;
}

.cell{
  width:100px;height:100px;
  font-size:40px;
  border:none;
  border-radius:15px;
  background:#111;
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px #6bc2ff, inset 0 0 20px #6bc2ff;
  transition:0.2s;
}

.cell:hover{transform:scale(1.1);}

#status{margin-top:15px;}

button{margin-top:10px;padding:8px 15px;border:none;border-radius:8px;background:#4ca6ff;color:white;}

.win{animation:pulse 0.5s infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.15);}}

.particle{
  position:absolute;
  width:6px;height:6px;
  background:gold;
  border-radius:50%;
  animation:explode 1s forwards;
}
@keyframes explode{
  to{transform:translate(var(--x),var(--y));opacity:0;}
}
</style>
</head>

<body>

<h1>Tic Tac PRO</h1>

<div id="score"></div>

<select id="mode">
<option value="ai">Vs IA</option>
<option value="pvp">2 Jogadores</option>
</select>

<select id="difficulty">
<option value="easy">Fácil</option>
<option value="medium">Médio</option>
<option value="hard">Impossível</option>
</select>

<div id="board"></div>
<div id="status">Sua vez</div>
<button onclick="resetGame()">Reiniciar</button>

<script>
const boardEl=document.getElementById("board");
const statusText=document.getElementById("status");
const scoreText=document.getElementById("score");

const mode=document.getElementById("mode");
const difficulty=document.getElementById("difficulty");

let board=["","","","","","","","",""];
let gameOver=false;
let currentPlayer="X";

let p=localStorage.getItem("p")||0;
let a=localStorage.getItem("a")||0;

const winSound=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const moveSound=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const music=new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
music.loop=true;music.volume=0.1;music.play();

const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function rank(s){
 if(s<3)return"🥉 Bronze";
 if(s<6)return"🥈 Prata";
 if(s<10)return"🥇 Ouro";
 return"👑 Mestre";
}

function updateScore(){
 scoreText.textContent=`Você:${p} (${rank(p)}) | IA:${a}`;
}

function save(){
 localStorage.setItem("p",p);
 localStorage.setItem("a",a);
}

function create(){
 boardEl.innerHTML="";
 board.forEach((c,i)=>{
  const b=document.createElement("button");
  b.className="cell";
  b.textContent=c;
  if(c)b.classList.add(c);
  b.onclick=()=>move(i);
  boardEl.appendChild(b);
 });
}

function move(i){
 if(board[i]||gameOver)return;

 board[i]=currentPlayer;
 playMove();
 update();

 if(check(currentPlayer))return end(currentPlayer+" venceu",currentPlayer==="X"?"p":"a");
 if(full())return end("Empate");

 if(mode.value==="pvp"){
  currentPlayer=currentPlayer==="X"?"O":"X";
  statusText.textContent="Vez do "+currentPlayer;
 }else{
  statusText.textContent="IA...";
  setTimeout(ai,300);
 }
}

function ai(){
 let move;

 if(difficulty.value==="easy"){
  move=random();
 }else if(difficulty.value==="medium"){
  move=Math.random()<0.5?random():best();
 }else{
  move=best();
 }

 board[move]="O";
 playMove();
 update();

 if(check("O"))return end("IA venceu","a");
 if(full())return end("Empate");

 statusText.textContent="Sua vez";
}

function random(){
 let e=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
 return e[Math.floor(Math.random()*e.length)];
}

function best(){
 let best=-Infinity,move;
 for(let i=0;i<9;i++){
  if(!board[i]){
   board[i]="O";
   let s=minimax(false);
   board[i]="";
   if(s>best){best=s;move=i;}
  }
 }
 return move;
}

function minimax(max){
 if(check("O"))return 1;
 if(check("X"))return -1;
 if(full())return 0;

 let best=max?-Infinity:Infinity;

 for(let i=0;i<9;i++){
  if(!board[i]){
   board[i]=max?"O":"X";
   let s=minimax(!max);
   board[i]="";
   best=max?Math.max(best,s):Math.min(best,s);
  }
 }
 return best;
}

function check(p){
 return wins.some(c=>c.every(i=>board[i]===p));
}

function full(){return board.every(c=>c);}

function update(){create();}

function highlight(){
 const cells=document.querySelectorAll(".cell");
 wins.forEach(c=>{
  if(c.every(i=>board[i]===board[c[0]]&&board[i]!="")){
   c.forEach(i=>cells[i].classList.add("win"));
  }
 });
}

function particles(){
 for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left="50%";
  p.style.top="50%";
  p.style.setProperty("--x",(Math.random()*200-100)+"px");
  p.style.setProperty("--y",(Math.random()*200-100)+"px");
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
 }
}

function speak(t){
 let msg=new SpeechSynthesisUtterance(t);
 speechSynthesis.speak(msg);
}

function playMove(){
 moveSound.currentTime=0;
 moveSound.play();
}

function end(msg,w){
 statusText.textContent=msg;
 gameOver=true;
 highlight();
 particles();
 winSound.play();

 if(w==="p"){p++;speak("Você venceu");}
 if(w==="a"){a++;speak("A inteligência artificial venceu");}

 updateScore();
 save();
}

function resetGame(){
 board=["","","","","","","","",""];
 gameOver=false;
 currentPlayer="X";
 statusText.textContent="Sua vez";
 update();
}

updateScore();
create();
</script>

</body>
</html>
